<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive layout for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Detect Internet Speed</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="Detect Internet Speed.css">
</head>

<body>
    <!-- Speed output container -->
    <div class="container">
        <!-- Bits per second output -->
        <p id="bits"><span>Speed In Bits:</span></p>

        <!-- Kilobits per second output -->
        <p id="kbs"><span>Speed In Kbs:</span></p>

        <!-- Megabits per second output -->
        <p id="mbs"><span>Speed In Mbs:</span></p>
    </div>

    <!-- Link JS -->
    <script src="Detect Internet Speed.js"></script>
</body>

</html>
