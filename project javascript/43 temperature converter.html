<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive design for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Temperature</title>

    <style>
        /* Reset default margin, padding and apply box-sizing */
        *,
        *:before,
        *:after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            /* Font style for entire page */
            font-family: poppins, sans-serif;

            /* Default font size */
            font-size: 18px;
        }

        /* Background color of whole page */
        body {
            background-color: #3164ff;
        }

        /* Main wrapper box */
        .wrapper {
            width: 450px;
            background-color: #ffffff;

            /* Inner spacing */
            padding: 70px 40px;

            /* Center the box on screen */
            position: absolute;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;

            /* Shadow effect */
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.25);

            /* Rounded corners */
            border-radius: 8px;

            /* Flexbox for layout */
            display: flex;
            justify-content: space-between;
        }

        /* Each input container */
        .container {
            width: 45%;
        }

        /* Input box styling */
        input {
            width: 100%;
            height: 50px;

            /* Rounded corners */
            border-radius: 5px;

            /* Default border */
            border: 2px solid #d2d2d2;

            outline: none;

            /* Space above input */
            margin-top: 8px;

            /* Inner spacing */
            padding: 0 10px;

            /* Larger font for numbers */
            font-size: 20px;
        }

        /* Change border color when input is focused */
        input:focus {
            border-color: #3164ff;
        }
    </style>
</head>

<body>

    <!-- Main container -->
    <div class="wrapper">

        <!-- Celsius input -->
        <div class="container">
            <label>Celsius</label>

            <!-- When user types, function is called -->
            <input type="number" id="celsius" oninput="celToFar()">
        </div>

        <!-- Fahrenheit input -->
        <div class="container">
            <label>Fahrenheit</label>

            <!-- Output field -->
            <input type="number" id="fahrenheit">
        </div>

    </div>

    <script>
        // Get reference to input elements
        let celsius = document.getElementById("celsius");
        let fahrenheit = document.getElementById("fahrenheit");

        // Function to convert Celsius to Fahrenheit
        function celToFar() {

            // Get value entered by user
            let c = celsius.value;

            // Apply conversion formula
            // Formula: (C × 1.8) + 32
            let f = (c * 1.8) + 32;

            // Display result in Fahrenheit input box
            fahrenheit.value = f;
        }
    </script>

</body>

</html>
