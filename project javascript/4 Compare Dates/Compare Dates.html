<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Dates</title>
    <link rel="stylesheet" href="Compare Dates.css">
</head>

<body>
    <!-- Main UI container -->
    <div class="container">

        <!-- Date input section -->
        <div class="dates">
            <!-- First date input -->
            <input type="date" id="date-1">

            <!-- Second date input -->
            <input type="date" id="date-2">
        </div>

        <!-- Button to trigger date comparison -->
        <button id="check">Check</button>

        <!-- Paragraph to show comparison result -->
        <p id="result">Input Some Value To get Started</p>
    </div>

    <script src="Compare Dates.js"></script>
</body>

</html>
