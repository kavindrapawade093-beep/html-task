<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"> <!-- Website character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Toast Notification</title>

    <style>
        /* Default CSS reset */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        /* Page background color */
        body {
            background-color: #e5e6ec;
        }

        /* Toast container - fixed position on screen */
        #taost-container {
            position: fixed;
            /* Same place even if scroll */
            top: 20px;
            /* Distance from top */
            right: 20px;
            /* Distance from right */
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* Space between toasts */
            z-index: 1000;
            /* Toasts show above all */
        }

        /* Toast style (success by default) */
        .toast {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background-color: #4caf50;
            /* Green success */
            color: #ffffff;
            border-radius: 5px;
            font-size: 16px;

            /* Animations */
            animation: slideIn 0.5s, fadeOut 0.5s 3s;
            opacity: 1;
        }

        /* Error toast style */
        .toast.error {
            background-color: #f44336;
            /* Red error */
            border-radius: 5px;
        }

        /* Slide in animation */
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                /* Start from outside screen */
            }

            to {
                transform: translateX(0);
            }
        }

        /* Fade out animation */
        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Toast container -->
    <div id="taost-container"></div>

    <!-- Buttons to trigger toast -->
    <button onclick="showToast('success! Your action was successful')">
        Show success toast
    </button>

    <button onclick="showToast('error! Something went wrong', 'error')">
        Show error toast
    </button>

    <script>
        /*
         * showToast function:
         * message -> toast text
         * type -> toast type (success or error)
         */
        function showToast(message, type = 'success') {
            const toastContainer = document.getElementById('taost-container');

            // Create new toast element
            const toast = document.createElement('div');

            // Add classes for styling
            toast.classList.add('toast', type);

            // Set message inside toast
            toast.innerText = message;

            // Add toast to DOM
            toastContainer.appendChild(toast);

            // Auto remove toast after 2 seconds
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
</body>

</html>
